    <main class="main-content">
        <h1 class="title">Gerenciador de Funcionários</h1>
        <h2 class="sub-title">Cadastro e gerenciamento de funcionários</h2>
        
        <section class="style-search-container">
            <h2 class="dashboard-title"><i class="fa-solid fa-magnifying-glass"></i>Buscar Funcionários</h2>
            <form action="#" class="search-container" method="post" id="searchForm">
                
                <input 
                    type="search" 
                    id="search-input" 
                    class="search-input" 
                    placeholder="Buscar por nome"> <button type="submit"     class="search-button">Pesquisar</button>
            </form>
        </section>

        <section class="style-search-container">
            <form action="#" method="post" class="container-client-form">

                <div class="register-container">
                    
                    <div class="input-container">
                        <label for="nome_funcionario">Nome do Funcionário</label>
                        <input type="text" name="nome_funcionario" id="nome_funcionario" placeholder="Digite o nome completo">
                    </div>
                    
                    <div class="input-container">
                        <label for="tel_funcionario">Telefone</label>
                        <input type="text" name="tel_funcionario" id="tel_funcionario" placeholder="Ex: (11) 98765-4321">
                    </div>

                    <div class="input-container">
                        <label for="id_funcao">ID da Função</label>
                        <input type="number" name="id_funcao" id="id_funcao" placeholder="Digite o ID da função">
                    </div>
                    
                </div> 
                <button class="orders-button button" type="submit"><i class="fa-solid fa-floppy-disk"></i>Cadastrar Funcionário</button>

            </form>
        </section>

        <section class="style-search-container" id="funcContainer">
            <h2 class="dashboard-title"><i class="fa-solid fa-list"></i>Funcionários Cadastrados</h2>

            <table >
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Telefone</th>
                        <th>Função</th>
        
                    </tr>
                </thead>
                <tbody id="tabelaFuncs"></tbody>
            </table>
            
            <div class="prox-ant-container">
                <button class="button"><i class="fa-solid fa-arrow-left"></i>Anterior</button>
                <button class="button">Proxima  <i class="fa-solid fa-arrow-right"></i></button>
            </div>
        </section>
    </main>


   <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script> 

let todosFuncionarios = [];

async function listar() { 
    try {
        const response = await fetch("https://fatecbackend.vercel.app/api/funcionarios/listar");
        return await response.json();
    } catch (e) {
        console.error(e);
        return [];
    }
}

function createTable(obj){
    var tbody = $('#tabelaFuncs');
    tbody.empty();

    var rows = "";
    obj.forEach(el => {
        rows += "<tr>";
        if(el.nome_funcionario) rows += "<td>" + el.nome_funcionario + "</td>";
        if(el.telefone_funcionario) rows += "<td>" + el.telefone_funcionario + "</td>";
        if(el.funcao) rows += "<td>" + el.funcao + "</td>";
        rows += "</tr>";
    });

    tbody.append(rows);
}

function filtrarFuncionarios(termo) {
    if(!termo || termo.trim() === '') {
        createTable(todosFuncionarios);
        return;
    }

    const termoLower = termo.toLowerCase().trim();
    const funcionariosFiltrados = todosFuncionarios.filter(func => {
        return func.nome_funcionario && 
               func.nome_funcionario.toLowerCase().includes(termoLower);
    });

    createTable(funcionariosFiltrados);
}

listar().then(data => {
    console.log(data);
    todosFuncionarios = data;
    createTable(data);
});

$('#searchForm').on('submit', function(e) {
    e.preventDefault();
    const termoBusca = $('#search-input').val();
    filtrarFuncionarios(termoBusca);
});

$('#search-input').on('input', function() {
    const termoBusca = $(this).val();
    filtrarFuncionarios(termoBusca);
});

</script>
</body>
